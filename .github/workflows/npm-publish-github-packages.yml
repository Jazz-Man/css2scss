# This workflow will build and publish a package to GitHub Packages
# For more information see: https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-npm-registry

name: Publish to GitHub Packages

on:
  push:
    branches:
      - master

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          registries: |
              https://registry.npmjs.org/
              @jazz-man:https://npm.pkg.github.com/|$GITHUB_TOKEN

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: bun run build

      - name: Run tests
        run: bun test

      - name: Get new version
        id: bump
        run: |
          # Use GitHub Actions environment variables
          # GITHUB_SHA: The commit SHA that triggered the workflow
          # GITHUB_RUN_NUMBER: Unique number for each run of the same workflow

          # Get short commit hash (first 7 characters)
          COMMIT_HASH=${{ github.sha }}
          COMMIT_SHORT=${COMMIT_HASH:0:7}

          # Create new version: 1.0.0-run{run_number}+{commit_short}
          # Using semver-compatible format with pre-release identifier
          NEW_VERSION="1.0.0-run${{ github.run_number }}+${COMMIT_SHORT}"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT


      - name: Bump version and publish
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          # Publish to GitHub Packages with --tolerate-republish to avoid errors on re-runs
          bun publish --tolerate-republish --production --tag=${{ steps.bump.outputs.version }} --dry-run
